version: 2

updates:

* package-ecosystem: "npm"
  directory: "/"

  schedule:
  interval: "weekly"

  open-pull-requests-limit: 1

  groups:
  all-dependencies:
  patterns:
  - "*"

  labels:

  * "dependabot"
  * "frontend"

  commit-message:
  prefix: "deps(frontend)"

* package-ecosystem: "github-actions"
  directory: "/"

  schedule:
  interval: "monthly"

  open-pull-requests-limit: 1

  groups:
  github-actions:
  patterns:
  - "*"

  labels:

  * "dependabot"

  commit-message:
  prefix: "deps(ci)"
